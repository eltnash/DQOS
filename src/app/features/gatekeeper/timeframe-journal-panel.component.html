<section class="journal-panel" [formGroup]="journalGroup()">
  <header class="journal-panel__header">
    <h3 class="journal-panel__title">{{ title() }}</h3>
    <p class="journal-panel__intro">Add one or more chart screenshots for this timeframe, describe what you see, and annotate images if needed.</p>
  </header>

  <app-journal-screenshots-panel
    [scope]="screenshotScope()"
    [fileInputId]="'screenshot-file-' + timeframe()"
    [title]="'Chart screenshots'"
    uploadHint="Drag images here, choose files, or paste from your clipboard. You can add multiple charts per timeframe."
  />

  <div class="journal-panel__notes">
    <label class="journal-panel__label" [for]="'notes-' + timeframe()">Notes describing this chart</label>
    <app-tagged-notes-editor
      formControlName="notes_content"
      [inputId]="'notes-' + timeframe()"
    />
  </div>
</section>
