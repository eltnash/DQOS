<div class="shell" [style.grid-template-columns]="gridColumns()">
  <app-account-rail [activeAccountId]="accountId()" />

  @if (accountId(); as id) {
    <app-account-sidebar [accountId]="id" />
  }

  <main
    class="shell__main"
    [class.shell__main--wide]="accountId() == null"
    [class.shell__main--navigating]="navigating()"
  >
    <router-outlet />
    @if (navigating()) {
      <div class="shell__route-skeleton">
        <app-page-skeleton [layout]="skeletonLayout()" />
      </div>
    }
  </main>
</div>
